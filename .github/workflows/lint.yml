name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: StyLua & Selene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rokit
        uses: CompeyDev/setup-rokit@v0.1.0

      - name: Check formatting (StyLua)
        run: stylua --check src

      - name: Lint (Selene)
        run: selene src
